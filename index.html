<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title></title>
    <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
          body {
            margin: 0;
            background: #fafafa;
          }

          #stories {
            height: 90px;
            width: 70vw;
            margin-top: -5px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #b5b5b5;
            border-radius: 2px;
            padding-left: 30px;
          }

          .user {
            width: 18%;
            display: inline-block;
          }

          .user p {
            text-align: center;
            border: 0;
            font: "Lucida Sans Unicode";
            font-weight: 100;
            font-size: smaller;
          }

          .post-header {
            color: white;
            height: 50px;
            box-sizing: border-box;
            width: inherit;
            padding: 5px;
            border-bottom: 1px solid #b5b5b5;
          }

          #navbar {
            display: inline-block;
            color: white;
            width: 100vw;
            border-bottom: solid 1px;
            border-color: #e5e5e5;
          }

          .post {
            border: 1px solid #b5b5b5;
            border-radius: 2px;
            height: 60vh;
            width: 560px;
            margin-left: 119px;
            margin-right: 119px;
            margin-top: 10px;
          }


          #logo {
            height: 40px;
            position: relative;
          }

          input {
            height: 25px;
            position: relative;
            width: 30vw;
            left:35vw;
            right:35vw;
            color: #fafafa;
            border: solid #b5b5b5 1px thick;
            border-radius: 3px;
          }

          #actions {
            height: 40px;
            position: relative;
            offset-position: 0 0;
          }

          .user img {
            padding-top: 5px;
            border-radius: 50%;
            border: double 4px #b5b5b5;
            width: 56px;
            height: 56px;
            display: block;
            margin-left: auto;
            margin-right: auto;
          }
        </style>
  </head>
  <body>
    <nav>
       
        <img id="logo" src="img/instagran.png" alt="instagran logo" >
    
        <input type="text" placeholder="search"/>

        <img id="actions" src="img/actions.png" alt="actions" >
    </nav>

    <section id="stories">
        <div class="user" id="mydiv">
            <img src="img/gran1.jpg" >
            <p class="userstory">Elma</p>
        </div>
        <div class="user">
            <img src="img/gran2.jpg" >
            <p class="userstory">Betty</p>
        </div>
        <div class="user">
            <img src="img/gran3.jpg" >
            <p class="userstory">Sandra</p>
        </div>
        <div class="user">
            <img src="img/gran4.jpg" >
            <p class="userstory">Delores</p>
        </div>

        <div class="user">
            <img src="img/gran5.jpg" >
            <p class="userstory">Karen</p>
        </div>
    </section>

    <section class="post">
        <div class="post-header">
            <img src="img/gran1.jpg"><span>Elma</span>
        </div>
        <div>
            <img class="post-image" src="img/cage.jpg" alt="cage image">
        </div>
    </section>

    <footer></footer>
</body>
</html>
